services:
  - type: web
    name: nepal-election-live
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
