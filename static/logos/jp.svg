<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Janamat Party - Chair (कुर्सी) -->
  <circle cx="50" cy="50" r="48" fill="#9933FF" stroke="#7722CC" stroke-width="2"/>
  <!-- Chair back -->
  <rect x="32" y="22" width="5" height="50" rx="2" fill="#FFD700"/>
  <rect x="63" y="22" width="5" height="50" rx="2" fill="#FFD700"/>
  <!-- Chair back horizontal bars -->
  <rect x="32" y="22" width="36" height="5" rx="2" fill="#FFD700"/>
  <rect x="32" y="32" width="36" height="3" rx="1" fill="#DAA520"/>
  <rect x="32" y="39" width="36" height="3" rx="1" fill="#DAA520"/>
  <!-- Seat -->
  <rect x="28" y="52" width="44" height="6" rx="2" fill="#FFD700"/>
  <!-- Front legs -->
  <rect x="30" y="58" width="5" height="22" rx="2" fill="#FFD700"/>
  <rect x="65" y="58" width="5" height="22" rx="2" fill="#FFD700"/>
  <!-- Cross bar between legs -->
  <rect x="35" y="68" width="30" height="3" rx="1" fill="#DAA520"/>
</svg>