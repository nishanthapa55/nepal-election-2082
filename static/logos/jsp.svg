<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- JSP - Umbrella/Chatta (छाता) -->
  <circle cx="50" cy="50" r="48" fill="#008000" stroke="#006400" stroke-width="2"/>
  <!-- Umbrella canopy -->
  <path d="M15,50 C15,28 30,15 50,15 C70,15 85,28 85,50 Z" fill="#FF4444" stroke="#CC0000" stroke-width="1"/>
  <!-- Umbrella ribs -->
  <line x1="50" y1="15" x2="50" y2="50" stroke="#CC0000" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="18" x2="28" y2="50" stroke="#CC0000" stroke-width="0.8" opacity="0.4"/>
  <line x1="68" y1="18" x2="72" y2="50" stroke="#CC0000" stroke-width="0.8" opacity="0.4"/>
  <!-- Umbrella handle (stick) -->
  <line x1="50" y1="50" x2="50" y2="82" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <!-- Umbrella hook -->
  <path d="M50,82 C50,88 45,88 42,85" fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <!-- Umbrella top tip -->
  <circle cx="50" cy="15" r="2.5" fill="#FFD700"/>
  <!-- Scalloped edge -->
  <path d="M15,50 C20,46 25,50 30,46 C35,50 40,46 45,50 C50,46 55,50 60,46 C65,50 70,46 75,50 C80,46 85,50 85,50" 
        fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
</svg>