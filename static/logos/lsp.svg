<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- LSP - Cycle (साइकल) - Loktantrik Samajwadi Party election symbol -->
  <circle cx="50" cy="50" r="48" fill="#336699" stroke="#254E75" stroke-width="2"/>
  <!-- Rear wheel -->
  <circle cx="32" cy="62" r="14" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="32" cy="62" r="2" fill="#FFFFFF"/>
  <!-- Spokes rear -->
  <line x1="32" y1="48" x2="32" y2="76" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  <line x1="18" y1="62" x2="46" y2="62" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  <!-- Front wheel -->
  <circle cx="68" cy="62" r="14" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="68" cy="62" r="2" fill="#FFFFFF"/>
  <!-- Spokes front -->
  <line x1="68" y1="48" x2="68" y2="76" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  <line x1="54" y1="62" x2="82" y2="62" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  <!-- Frame -->
  <line x1="32" y1="62" x2="50" y2="45" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="50" y1="45" x2="68" y2="62" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="32" y1="62" x2="50" y2="55" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="50" y1="55" x2="50" y2="45" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="50" y1="45" x2="62" y2="38" stroke="#FFD700" stroke-width="2"/>
  <!-- Handlebars -->
  <line x1="62" y1="38" x2="68" y2="42" stroke="#FFD700" stroke-width="2"/>
  <line x1="68" y1="62" x2="62" y2="38" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Seat -->
  <rect x="46" y="42" width="10" height="3" rx="1.5" fill="#FFD700"/>
  <!-- Pedal -->
  <circle cx="50" cy="58" r="3" fill="none" stroke="#FFD700" stroke-width="1.5"/>
</svg>