<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- CPN Maoist Centre - Hammer and Sickle in Star -->
  <circle cx="50" cy="50" r="48" fill="#CC0000" stroke="#990000" stroke-width="2"/>
  <!-- Five-pointed star -->
  <polygon points="50,12 61,40 92,40 67,58 77,88 50,70 23,88 33,58 8,40 39,40" 
           fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <!-- Hammer and sickle inside -->
  <g transform="translate(50,50) scale(0.55)" fill="#CC0000">
    <!-- Hammer handle -->
    <rect x="-2" y="-18" width="4" height="32" rx="1"/>
    <!-- Hammer head -->
    <rect x="-9" y="-20" width="18" height="7" rx="1.5"/>
    <!-- Sickle -->
    <path d="M4,4 C12,-4 16,-12 10,-18 L14,-18 C22,-10 16,0 6,8 Z" fill="#CC0000"/>
  </g>
</svg>