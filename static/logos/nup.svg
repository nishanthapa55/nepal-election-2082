<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Nagarik Unmukti Party - Balance/Scale (तराजू) -->
  <circle cx="50" cy="50" r="48" fill="#00CC99" stroke="#00AA77" stroke-width="2"/>
  <!-- Center pole -->
  <rect x="48" y="20" width="4" height="55" rx="1" fill="#FFD700"/>
  <!-- Top beam -->
  <rect x="15" y="28" width="70" height="4" rx="2" fill="#FFD700"/>
  <!-- Top triangle/fulcrum -->
  <polygon points="50,20 45,28 55,28" fill="#FFD700"/>
  <!-- Left pan strings -->
  <line x1="20" y1="32" x2="15" y2="55" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="20" y1="32" x2="25" y2="55" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Left pan -->
  <path d="M10,55 Q20,62 30,55" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <!-- Right pan strings -->
  <line x1="80" y1="32" x2="75" y2="55" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="80" y1="32" x2="85" y2="55" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Right pan -->
  <path d="M70,55 Q80,62 90,55" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <!-- Base -->
  <rect x="35" y="75" width="30" height="5" rx="2" fill="#FFD700"/>
  <polygon points="50,75 42,80 58,80" fill="#DAA520"/>
</svg>