<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- RPP - Cow (गाई) -->
  <circle cx="50" cy="50" r="48" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  <!-- Cow body -->
  <ellipse cx="48" cy="55" rx="22" ry="14" fill="#F5F5DC"/>
  <!-- Cow head -->
  <ellipse cx="72" cy="42" rx="10" ry="12" fill="#F5F5DC"/>
  <!-- Horns -->
  <path d="M68,32 C65,22 62,20 60,24" fill="none" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M76,32 C79,22 82,20 84,24" fill="none" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ear -->
  <ellipse cx="65" cy="36" rx="4" ry="6" fill="#DEB887" transform="rotate(-20,65,36)"/>
  <!-- Eye -->
  <circle cx="75" cy="40" r="2" fill="#333"/>
  <!-- Nose/mouth -->
  <ellipse cx="78" cy="48" rx="5" ry="3" fill="#DEB887"/>
  <!-- Legs -->
  <rect x="32" y="65" width="5" height="16" rx="2" fill="#F5F5DC"/>
  <rect x="42" y="65" width="5" height="16" rx="2" fill="#F5F5DC"/>
  <rect x="54" y="65" width="5" height="16" rx="2" fill="#F5F5DC"/>
  <rect x="62" y="65" width="5" height="16" rx="2" fill="#F5F5DC"/>
  <!-- Tail -->
  <path d="M26,50 C18,45 16,52 20,56" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  <!-- Udder -->
  <ellipse cx="50" cy="68" rx="6" ry="4" fill="#FFB6C1"/>
</svg>