<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- RSP - Bell inside circle (घण्टी) -->
  <circle cx="50" cy="50" r="48" fill="#87CEEB" stroke="#4A90D9" stroke-width="2"/>
  <!-- Bell body -->
  <path d="M30,58 C30,35 35,22 50,20 C65,22 70,35 70,58 L75,62 C76,64 75,66 73,66 L27,66 C25,66 24,64 25,62 Z" 
        fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
  <!-- Bell top knob -->
  <circle cx="50" cy="20" r="5" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <!-- Bell clapper -->
  <circle cx="50" cy="68" r="5" fill="#DAA520"/>
  <!-- Bell rim highlight -->
  <path d="M33,58 C33,38 37,26 50,24 C63,26 67,38 67,58" 
        fill="none" stroke="#FFF8DC" stroke-width="1" opacity="0.5"/>
  <!-- Circle border around bell -->
  <circle cx="50" cy="48" r="35" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
</svg>