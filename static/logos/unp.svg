<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Ujaylo Nepal Party - Sun/Light bulb symbol (Ujaylo = Light) -->
  <!-- Bright orange/golden sun representing light/brightness -->
  <circle cx="50" cy="50" r="48" fill="#FFA500" stroke="#CC8400" stroke-width="2"/>
  
  <!-- Sun rays -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="8" x2="50" y2="18"/>
    <line x1="50" y1="82" x2="50" y2="92"/>
    <line x1="8" y1="50" x2="18" y2="50"/>
    <line x1="82" y1="50" x2="92" y2="50"/>
    <line x1="20" y1="20" x2="27" y2="27"/>
    <line x1="73" y1="73" x2="80" y2="80"/>
    <line x1="80" y1="20" x2="73" y2="27"/>
    <line x1="27" y1="73" x2="20" y2="80"/>
  </g>
  
  <!-- Central light bulb -->
  <ellipse cx="50" cy="45" rx="16" ry="18" fill="#FFFFFF" opacity="0.9"/>
  <rect x="44" y="60" width="12" height="6" rx="1" fill="#FFFFFF" opacity="0.9"/>
  <rect x="46" y="66" width="8" height="3" rx="1" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Filament inside bulb -->
  <path d="M45 42 Q47 38 50 42 Q53 38 55 42" fill="none" stroke="#FFA500" stroke-width="2"/>
  <line x1="50" y1="42" x2="50" y2="55" stroke="#FFA500" stroke-width="1.5"/>
</svg>
